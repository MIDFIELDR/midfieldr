url: https://midfieldr.github.io/midfieldr/

template:
  bootstrap: 5
  bslib:
    code_font: {google: "Courier Prime"}
    code-bg: "#FFFFFF"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
  math-rendering: katex
   
navbar:
  title: ~
  left:
  
    - text: Get started
      href: articles/art-000-getting-started.html

    - text: Case study
      menu:
      
      - text: Case study using data.table
        href: articles/art-004-case-study.html
        
      - text: Case study using dplyr
        href: articles/art-005-case-dplyr.html
        
    - text: Articles
      menu:
      
      - text: Planning
        href: articles/art-010-planning.html
        
      - text: Data sufficiency
        href: articles/art-020-data-sufficiency.html
        
      - text: Degree seeking
        href: articles/art-030-degree-seeking.html
        
      - text: Programs
        href: articles/art-040-programs.html
        
      - text: Alternative CIPs
        href: articles/art-041-alternative-cip.html
        
      - text: Blocs
        href: articles/art-050-blocs.html
        
      - text: FYE proxies
        href: articles/art-060-fye-proxies.html
        
      - text: Starters
        href: articles/art-070-starters.html
    
      - text: Graduates
        href: articles/art-080-graduates.html
       
      - text: Groupings
        href: articles/art-090-groupings.html
        
      - text: Graduation rate
        href: articles/art-100-grad-rate.html
        
      - text: Stickiness
        href: articles/art-110-stickiness.html
        
      - text: Multiway data and charts
        href: articles/art-120-multiway.html
        
      
    
    - text: Reference
      href: reference/index.html

    - text: News
      href: news/index.html

reference:

  - title    : Package
    contents :
    - midfieldr-package
    - deprec_midfieldr
    
  - title    : Functions
    contents :
    - starts_with("add_")
    - filter_cip
    - order_multiway
    - prep_fye_mice
    - select_basic_cols
    
  - title    : Utility
    contents :
    - catch_error
    - look_at
    - sort_uniq
    

  - title    : Prepared data
    contents :
    - baseline_mcid
    - cip
    - cip2010
    - fye_proxy
    - grade_scale
    - sat_act_scale
    - starts_with("study_")

  - title    : Toy data for examples
    contents :
    - starts_with("toy_")

news:
  cran_dates: false

authors:
  Richard Layton:
    href: https://github.com/graphdr

home:
  links:
  - text: midfielddata
    href: https://midfieldr.github.io/midfielddata

deploy:
  install_metadata: true


